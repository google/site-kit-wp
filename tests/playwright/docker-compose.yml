services:
  mysql:
    image: mariadb:10.3.39
    ports:
      - 9306:3306
    volumes:
      - ./docker/mariadb:/docker-entrypoint-initdb.d
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: wordpress
    profiles:
      - generate
      - test
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-pexample",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sitekit

  wp:
    image: ghcr.io/google/site-kit-wp/playwright-wp:${WP_VERSION:-5.2.21}
    ports:
      - 9002:80
    volumes:
      - ./docker/wordpress/mu-plugins:/var/www/html/wp-content/mu-plugins
      - ./docker/wordpress/plugins:/var/www/html/wp-content/plugins/google-site-kit-test-plugins
      - ./docker/wordpress/db.php:/var/www/html/wp-content/db.php
      - type: bind
        source: ${PLUGIN_PATH:-../../}
        target: /var/www/html/wp-content/plugins/google-site-kit
        read_only: true
    environment:
      WP_VERSION: ${WP_VERSION:-5.2.21}
      WORDPRESS_DB_HOST: mysql
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: example
      WORDPRESS_DEBUG: ${WP_DEBUG:-1}
      WORDPRESS_CONFIG_EXTRA: |
        define( 'SCRIPT_DEBUG', true );
        define( 'WP_DEBUG_LOG', true );
        define( 'WP_DEBUG_DISPLAY', false );
        define( 'WP_HTTP_BLOCK_EXTERNAL', ! defined( 'WP_CLI' ) );
        define( 'WP_ACCESSIBLE_HOSTS', '*.wordpress.org,*.googleapis.com' );
        define( 'WP_AUTO_UPDATE_CORE', false );
      PLAYWRIGHT_MAILPIT_URL: http://mailpit:8025
    profiles:
      - generate
      - test
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sitekit

  mailpit:
    image: axllent/mailpit:v1.29.2
    ports:
      - 1025:1025
      - 8025:8025
    profiles:
      - test
    networks:
      - sitekit

  fixtures:
    build:
      context: ./docker/fixtures
    image: site-kit-wp/playwright-node:22-alpine
    command: node --watch index.ts
    volumes:
      - ./docker/fixtures:/fixtures
    expose:
      - "80"
      - "443"
    profiles:
      - test
    networks:
      sitekit:
        aliases:
          - analyticsadmin.googleapis.com
          - analyticsdata.googleapis.com
          - searchconsole.googleapis.com
          - oauth2.googleapis.com
          - tagmanager.googleapis.com
          - adsense.googleapis.com
          - pagespeedonline.googleapis.com
          - subscribewithgoogle.googleapis.com
          - www.googleapis.com
          - storage.googleapis.com

networks:
  sitekit:
