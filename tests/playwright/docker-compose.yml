services:
  mysql:
    image: mariadb:10.3.39
    ports:
      - 9306:3306
    volumes:
      - ./docker/mariadb:/docker-entrypoint-initdb.d
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: wordpress
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-pexample",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  wp:
    build:
      context: ./docker/wordpress
      args:
        WP_VERSION: ${WP_VERSION:-latest}
    image: google-site-kit-wp:${WP_VERSION:-latest}
    ports:
      - 9002:80
    volumes:
      - ../../:/var/www/html/wp-content/plugins/google-site-kit
      - ./docker/wordpress/mu-plugins:/var/www/html/wp-content/mu-plugins
      - ./docker/wordpress/plugins:/var/www/html/wp-content/plugins/google-site-kit-test-plugins
      - ./docker/wordpress/db.php:/var/www/html/wp-content/db.php
    environment:
      WORDPRESS_DB_HOST: mysql
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: example
      WORDPRESS_DEBUG: 1
      WORDPRESS_CONFIG_EXTRA: |
        define( 'SCRIPT_DEBUG', true );
        define( 'WP_DEBUG_LOG', true );
        define( 'WP_DEBUG_DISPLAY', true );
        define( 'WP_HTTP_BLOCK_EXTERNAL', ! defined( 'WP_CLI' ) );
        define( 'WP_ACCESSIBLE_HOSTS', '*.wordpress.org' );
        define( 'WP_AUTO_UPDATE_CORE', false );
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  wordpress-debug-log:
    image: alpine:3.22.1
    command: tail -n 0 -F /var/www/html/wp-content/debug.log
    volumes_from:
      - wp
    depends_on:
      wp:
        condition: service_healthy
