name: Playwright Tests

on:
  push:
    branches:
      - develop
      - main
    # Ignore Storybook-only and unit-test-only changes when checking to run
    # E2E tests. This is useful when adding/modifying/refactoring/removing
    # test code ONLY in a commit, but saves running the expensive E2E test
    # suite on GitHub Actions when all that's changing are tests and not code
    # that would affect E2E behavior.
    paths:
      - ".github/workflows/playwright.yml"
      - ".babelrc"
      - "assets/**"
      - "includes/**"
      - "*.php"
      - "jest-puppeteer.config.js"
      - "composer.json"
      - "composer.lock"
      - "php-scoper/composer.lock"
      - "package.json"
      - "package-lock.json"
      - "postcss.config.js"
      - "webpack/*.config.js"
      - "webpack.config.js"
      - "tests/playwright/**"
      - "!assets/**/__tests__/**/*.js"
      - "!assets/**/test/*.js"
      - "!assets/**/*.test.js"
      - "!packages/**/__tests__/**/*.js"
      - "!packages/**/test/*.js"
      - "!packages/**/*.test.js"
  pull_request:
    branches:
      - develop
      - main
      - "feature/**"
    # Ignore Storybook-only and unit-test-only changes when checking to run
    # E2E tests. This is useful when adding/modifying/refactoring/removing
    # test code ONLY in a commit, but saves running the expensive E2E test
    # suite on GitHub Actions when all that's changing are tests and not code
    # that would affect E2E behavior.
    paths:
      - ".github/workflows/playwright.yml"
      - ".babelrc"
      - "assets/**"
      - "includes/**"
      - "*.php"
      - "jest-puppeteer.config.js"
      - "composer.json"
      - "composer.lock"
      - "php-scoper/composer.lock"
      - "package.json"
      - "package-lock.json"
      - "postcss.config.js"
      - "webpack/*.config.js"
      - "webpack.config.js"
      - "tests/playwright/**"
      - "!assets/**/__tests__/**/*.js"
      - "!assets/**/test/*.js"
      - "!assets/**/*.test.js"
      - "!packages/**/__tests__/**/*.js"
      - "!packages/**/test/*.js"
      - "!packages/**/*.test.js"
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

env:
  GCS_BUCKET: site-kit-playwright
  FORBID_ONLY: true
  RETRIES: 2
  WORKERS: 4

jobs:
  playwright-tests:
    name: Playwright (WordPress ${{ matrix.wp_version }})
    strategy:
      fail-fast: false
      matrix:
        wp_version: ["latest"]
        include:
          - wp_version: "5.2.4"
    env:
      WP_VERSION: ${{ matrix.wp_version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js (.nvmrc)
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: npm install and build
        run: |
          npm ci --workspaces --include-workspace-root
          npm run -w tests/playwright setup
          npm run build:dev

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "7.4"
          tools: composer:2.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Composer Install
        run: composer install --no-interaction --no-progress --no-dev

      - name: Start environment
        run: npm run playwright:env:start

      - name: Run the tests
        run: npm run test:playwright

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report-run[${{ github.run_attempt }}]-wp[${{ matrix.wp_version }}]
          path: tests/playwright/artifacts/

      - name: Set report target directory
        id: report-target
        if: always()
        run: |
          suffix="wp-${{ matrix.wp_version }}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "dir=pull/${{ github.event.number }}/${suffix}" >> "$GITHUB_OUTPUT"
          else
            echo "dir=${GITHUB_REF##*/}/${suffix}" >> "$GITHUB_OUTPUT"
          fi

      - uses: google-github-actions/auth@v3
        if: always()
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Upload report files
        uses: google-github-actions/upload-cloud-storage@v2
        if: always()
        with:
          path: tests/playwright/artifacts/playwright-html
          destination: ${{ env.GCS_BUCKET }}/${{ steps.report-target.outputs.dir }}
          parent: false
          process_gcloudignore: false

      - name: Upload no-cache report files
        uses: google-github-actions/upload-cloud-storage@v2
        if: always()
        with:
          path: tests/playwright/artifacts/playwright-html
          glob: "!(*.js*)"
          destination: ${{ env.GCS_BUCKET }}/${{ steps.report-target.outputs.dir }}
          parent: false
          process_gcloudignore: false
          headers: |-
            cache-control: no-store

  add-comment-to-pr:
    name: Add comment to PR
    runs-on: ubuntu-latest
    needs: playwright-tests
    if: always() && github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Find existing comment
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: Playwright report is ready

      - name: Get comment body
        id: get-comment-body
        run: |
          body="Playwright report is ready:
          - [WordPress latest](https://storage.googleapis.com/${{ env.GCS_BUCKET }}/pull/${{ github.event.pull_request.number }}/wp-latest/index.html)
          - [WordPress 5.2.4](https://storage.googleapis.com/${{ env.GCS_BUCKET }}/pull/${{ github.event.pull_request.number }}/wp-5.2.4/index.html)"
          delimiter="${body//$'\n'/'%0A'}"
          echo "body<<${delimiter}" >> "$GITHUB_OUTPUT"
          echo "$body" >> "$GITHUB_OUTPUT"
          echo "${delimiter}" >> "$GITHUB_OUTPUT"

      - name: Create or update comment on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: ${{ steps.get-comment-body.outputs.body }}
