name: Playwright

on:
  push:
    branches:
      - develop
      - main
    # Ignore Storybook-only and unit-test-only changes when checking to run
    # E2E tests. This is useful when adding/modifying/refactoring/removing
    # test code ONLY in a commit, but saves running the expensive E2E test
    # suite on GitHub Actions when all that's changing are tests and not code
    # that would affect E2E behavior.
    paths:
      - ".github/workflows/playwright.yml"
      - ".babelrc"
      - "assets/**"
      - "includes/**"
      - "*.php"
      - "jest-puppeteer.config.js"
      - "composer.json"
      - "composer.lock"
      - "php-scoper/composer.lock"
      - "package.json"
      - "package-lock.json"
      - "postcss.config.js"
      - "webpack/*.config.js"
      - "webpack.config.js"
      - "tests/playwright/**"
      - "!assets/**/__tests__/**/*.js"
      - "!assets/**/test/*.js"
      - "!assets/**/*.test.js"
      - "!packages/**/__tests__/**/*.js"
      - "!packages/**/test/*.js"
      - "!packages/**/*.test.js"
  pull_request:
    branches:
      - develop
      - main
      - "feature/**"
    # Ignore Storybook-only and unit-test-only changes when checking to run
    # E2E tests. This is useful when adding/modifying/refactoring/removing
    # test code ONLY in a commit, but saves running the expensive E2E test
    # suite on GitHub Actions when all that's changing are tests and not code
    # that would affect E2E behavior.
    paths:
      - ".github/workflows/playwright.yml"
      - ".babelrc"
      - "assets/**"
      - "includes/**"
      - "*.php"
      - "jest-puppeteer.config.js"
      - "composer.json"
      - "composer.lock"
      - "php-scoper/composer.lock"
      - "package.json"
      - "package-lock.json"
      - "postcss.config.js"
      - "webpack/*.config.js"
      - "webpack.config.js"
      - "tests/playwright/**"
      - "!assets/**/__tests__/**/*.js"
      - "!assets/**/test/*.js"
      - "!assets/**/*.test.js"
      - "!packages/**/__tests__/**/*.js"
      - "!packages/**/test/*.js"
      - "!packages/**/*.test.js"
    types:
      - opened
      - closed
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

env:
  GCS_BUCKET: site-kit-github-artifacts
  GCS_ROOT_PATH: playwright
  FORBID_ONLY: true
  RETRIES: 2
  WORKERS: 4

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' || ( github.event_name == 'pull_request' && github.event.pull_request.draft == false )
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer:2.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Composer Install
        run: composer install --no-interaction --no-progress --no-dev

      - name: Setup Node.js (.nvmrc)
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Prepare plugin
        run: |
          npm ci -w tests/playwright --include-workspace-root
          npm run dev-zip
          npm run -w tests/playwright setup
          unzip -q google-site-kit.v*.zip -d plugin/
        env:
          SKIP_PATCH_PACKAGE: '1'

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v6
        with:
          name: plugin
          path: plugin/google-site-kit

      - name: Upload Playwright browsers artifact
        uses: actions/upload-artifact@v6
        with:
          name: playwright-browsers
          path: ~/.cache/ms-playwright

  playwright-tests:
    name: WordPress ${{ matrix.wp_version }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        wp_version: ["latest", "nightly"]
        include:
          - wp_version: "5.2.21"
    env:
      WP_VERSION: ${{ matrix.wp_version }}
      PLUGIN_PATH: ${{ github.workspace }}/plugin/google-site-kit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js (.nvmrc)
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: npm install
        run: npm ci -w tests/playwright
        env:
          SKIP_PATCH_PACKAGE: '1'

      - name: Download plugin artifact
        uses: actions/download-artifact@v6
        with:
          name: plugin
          path: plugin/google-site-kit

      - name: Download Playwright browsers artifact
        uses: actions/download-artifact@v6
        with:
          name: playwright-browsers
          path: ~/.cache/ms-playwright

      - name: Restore Playwright browser permissions
        run: chmod -R +x ~/.cache/ms-playwright

      - name: Cache Docker images
        id: docker-cache
        if: matrix.wp_version != 'nightly'
        uses: actions/cache@v5
        with:
          path: /tmp/docker-images
          key: docker-${{ env.WP_VERSION }}-${{ hashFiles('tests/playwright/docker/wordpress/Dockerfile', 'tests/playwright/docker-compose.yml') }}

      - name: Load Docker images from cache
        if: matrix.wp_version != 'nightly' && steps.docker-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-images/images.tar

      - name: Build and cache Docker images
        if: matrix.wp_version == 'nightly' || steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          echo "Building Docker images..."
          docker compose -f tests/playwright/docker-compose.yml build --quiet
          echo "Pulling images..."
          docker compose -f tests/playwright/docker-compose.yml pull --ignore-buildable --quiet
          if [ "${{ matrix.wp_version }}" != "nightly" ]; then
            echo "Saving Docker images to cache..."
            mkdir -p /tmp/docker-images
            docker compose -f tests/playwright/docker-compose.yml config --images \
              | xargs docker save -o /tmp/docker-images/images.tar
          fi

      - name: Start environment
        run: npm run playwright:env:start

      - name: Run tests
        run: npm run test:playwright
        env:
          PLAYWRIGHT_HTML_TITLE: "WordPress ${{ matrix.wp_version }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report-run[${{ github.run_attempt }}]-wp[${{ matrix.wp_version }}]
          path: tests/playwright/artifacts/

      - name: Set report target directory
        id: report-target
        if: always()
        run: |
          suffix="wp-${{ matrix.wp_version }}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "dir=pull/${{ github.event.number }}/${suffix}" >> "$GITHUB_OUTPUT"
          else
            echo "dir=${GITHUB_REF##*/}/${suffix}" >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/upload-to-gcs
        if: always()
        with:
          credentials-json: ${{ secrets.GCP_CREDENTIALS }}
          path: tests/playwright/artifacts
          destination: ${{ env.GCS_ROOT_PATH }}/${{ steps.report-target.outputs.dir }}

  add-comment-to-pr:
    name: Add comment to PR
    runs-on: ubuntu-latest
    needs: playwright-tests
    if: always() && github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/update-pr-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          section-id: playwright
          section-content: |
            🎭 **Playwright reports for ${{ github.event.pull_request.head.sha }}:**
            - [WordPress latest](https://storage.googleapis.com/${{ env.GCS_BUCKET }}/${{ env.GCS_ROOT_PATH }}/pull/${{ github.event.pull_request.number }}/wp-latest/playwright-html/index.html)
            - [WordPress nightly](https://storage.googleapis.com/${{ env.GCS_BUCKET }}/${{ env.GCS_ROOT_PATH }}/pull/${{ github.event.pull_request.number }}/wp-nightly/playwright-html/index.html)
            - [WordPress 5.2.21](https://storage.googleapis.com/${{ env.GCS_BUCKET }}/${{ env.GCS_ROOT_PATH }}/pull/${{ github.event.pull_request.number }}/wp-5.2.21/playwright-html/index.html)

  remove-playwright-reports:
    name: Remove Playwright reports
    runs-on: ubuntu-latest
    if: ( github.event_name == 'pull_request' && github.event.action == 'closed' && contains( github.head_ref, 'dependabot/' ) == false ) && github.event.pull_request.head.repo.fork == false
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/remove-gcs-path
        with:
          credentials-json: ${{ secrets.GCP_CREDENTIALS }}
          path: ${{ env.GCS_ROOT_PATH }}/pull/${{ github.event.pull_request.number }}

      - uses: ./.github/actions/update-pr-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          section-id: playwright
          section-content: |
            🎭 **Playwright reports for ${{ github.event.pull_request.head.sha }}:**
            - Reports have been deleted.
