name: Remove from GCS
description: Authenticates with GCP and removes all files at a given path from Cloud Storage.

inputs:
  credentials-json:
    description: GCP service account credentials JSON
    required: true
  path:
    description: Path within the GCS bucket to remove (e.g., playwright/pull/123)
    required: true

runs:
  using: composite
  steps:
    - uses: google-github-actions/auth@v3
      with:
        credentials_json: ${{ inputs.credentials-json }}

    - uses: google-github-actions/setup-gcloud@v3

    - name: Validate path
      shell: bash
      run: |
        path="${{ inputs.path }}"
        if [ -z "$path" ]; then
          echo "::error::Path must not be empty."
          exit 1
        fi
        # Path must have at least 3 segments (e.g., playwright/pull/123)
        segment_count=$(echo "$path" | tr '/' '\n' | grep -c .)
        if [ "$segment_count" -lt 3 ]; then
          echo "::error::Path must have at least 3 segments (e.g., playwright/pull/123), got: $path"
          exit 1
        fi

    - name: Remove files
      shell: bash
      run: gcloud storage rm "gs://site-kit-github-artifacts/${{ inputs.path }}/**"
