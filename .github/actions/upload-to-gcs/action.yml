name: Upload to GCS
description: Authenticates with GCP and uploads files to Cloud Storage, with an optional no-cache variant.

inputs:
  credentials-json:
    description: GCP service account credentials JSON
    required: true
  path:
    description: Local path to upload
    required: true
  destination:
    description: Path within the GCS bucket (e.g., storybook/pull/123)
    required: true

outputs:
  public-url:
    description: Public HTTPS URL of the uploaded destination
    value: ${{ steps.set-url.outputs.public-url }}

runs:
  using: composite
  steps:
    - name: Set public URL output
      id: set-url
      shell: bash
      run: echo "public-url=https://storage.googleapis.com/site-kit-github-artifacts/${{ inputs.destination }}" >> "$GITHUB_OUTPUT"

    - uses: google-github-actions/auth@v3
      with:
        credentials_json: ${{ inputs.credentials-json }}

    - name: Upload files
      uses: google-github-actions/upload-cloud-storage@v3
      with:
        path: ${{ inputs.path }}
        destination: site-kit-github-artifacts/${{ inputs.destination }}
        parent: false
        process_gcloudignore: false
        headers: |-
          cache-control: no-store
