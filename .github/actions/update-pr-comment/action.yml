name: Update PR Comment
description: Creates or updates a consolidated PR comment, replacing a named section with new content.

inputs:
  issue-number:
    description: The PR number
    required: true
  section-id:
    description: Unique identifier for the section (e.g., zips, storybook, playwright)
    required: true
  section-content:
    description: Markdown content for this section (multi-line supported)
    required: true

runs:
  using: composite
  steps:
    - name: Find existing consolidated comment
      id: find-comment
      uses: peter-evans/find-comment@v3
      with:
        issue-number: ${{ inputs.issue-number }}
        comment-author: github-actions[bot]
        body-includes: '<!-- site-kit-ci-status -->'

    - name: Build updated comment body
      id: build-body
      shell: python3 {0}
      env:
        SECTION_ID: ${{ inputs.section-id }}
        SECTION_CONTENT: ${{ inputs.section-content }}
        EXISTING_BODY: ${{ steps.find-comment.outputs.comment-body }}
      run: |
        import os, re, hashlib
        SECTION_ID = os.environ.get('SECTION_ID', '')
        SECTION_CONTENT = os.environ.get('SECTION_CONTENT', '')
        EXISTING_BODY = os.environ.get('EXISTING_BODY', '')
        BASE_MARKER = '<!-- site-kit-ci-status -->'
        HEADER = BASE_MARKER + '\n> 🤖 _This comment is automatically updated by CI workflows. Each section is managed independently._\n'

        body = EXISTING_BODY if EXISTING_BODY.strip() else HEADER
        if BASE_MARKER not in body:
            body = HEADER + body

        marker_start = f'<!-- section: {SECTION_ID} -->'
        marker_end = f'<!-- /section: {SECTION_ID} -->'
        full_replacement = marker_start + '\n' + SECTION_CONTENT.strip() + '\n' + marker_end
        pattern = re.escape(marker_start) + r'.*?' + re.escape(marker_end)

        if re.search(pattern, body, re.DOTALL):
            new_body = re.sub(pattern, lambda m: full_replacement, body, flags=re.DOTALL)
        else:
            new_body = body.rstrip('\n') + '\n' + full_replacement + '\n'

        delimiter = 'EOF_' + hashlib.sha256(new_body.encode()).hexdigest()[:16]
        with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
            fh.write(f'body<<{delimiter}\n{new_body}\n{delimiter}\n')

    - name: Create or update consolidated comment
      uses: peter-evans/create-or-update-comment@v4
      with:
        comment-id: ${{ steps.find-comment.outputs.comment-id }}
        issue-number: ${{ inputs.issue-number }}
        edit-mode: replace
        body: ${{ steps.build-body.outputs.body }}
