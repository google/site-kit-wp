name: Build and Push Docker Image
description: Sets up QEMU and Docker Buildx, logs in to a container registry, and builds and pushes a Docker image.

inputs:
  registry-password:
    description: Password or token for the container registry
    required: true
  context:
    description: Docker build context path
    required: true
  tags:
    description: Image tags (one per line)
    required: true
  build-args:
    description: Build-time variables (one per line, KEY=VALUE)
    required: false
    default: ''
  labels:
    description: Metadata labels for the image (one per line, KEY=VALUE)
    required: false
    default: ''
  skip-if-exists-tag:
    description: If provided, skip the build when this image tag already exists in the registry
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to container registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: google-site-kit-bot
        password: ${{ inputs.registry-password }}

    - name: Check if image already exists in registry
      id: image_check
      if: inputs.skip-if-exists-tag != ''
      shell: bash
      run: |
        if docker buildx imagetools inspect ${{ inputs.skip-if-exists-tag }} > /dev/null 2>&1; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "Image ${{ inputs.skip-if-exists-tag }} already exists, skipping build."
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Build and push Docker image
      if: steps.image_check.outputs.exists != 'true'
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        tags: ${{ inputs.tags }}
        build-args: ${{ inputs.build-args }}
        labels: ${{ inputs.labels }}
        push: true
        platforms: linux/amd64,linux/arm64
